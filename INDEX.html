<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CodePath BR — Unidade 1: Lógica</title>
<style>
  :root{
    --bg:#f4f3f8; --surface:#fff; --ink:#1a1726; --muted:#6b6580; --line:#e4e1ee;
    --indigo:#5b4bd6; --indigo-soft:#ece9fb; --indigo-2:#7a6bff;
    --green:#13a463; --green-soft:#e3f6ec; --green-line:#bce6cf;
    --red:#d6453b; --red-soft:#fbe8e6; --red-line:#f2c4bf;
    --amber:#e8a01c;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.5;display:flex;justify-content:center}
  .app{width:100%;max-width:480px;min-height:100vh;background:var(--surface);
    display:flex;flex-direction:column;position:relative}
  @media(min-width:520px){.app{box-shadow:0 0 60px rgba(40,30,80,.08)}}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;
    border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:5}
  .close{font-size:22px;color:var(--muted);background:none;border:none;cursor:pointer;
    line-height:1;padding:2px 6px}
  .progress{flex:1;height:11px;background:var(--indigo-soft);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--indigo-2),var(--indigo));
    border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .lives{display:flex;gap:2px;font-size:16px}
  .heart{transition:.25s}.heart.lost{opacity:.22;transform:scale(.8)}

  /* body */
  .body{flex:1;padding:24px 18px 130px;overflow-y:auto}
  .crumb{font-family:var(--mono);font-size:11px;color:var(--indigo);font-weight:600;
    letter-spacing:.04em;margin-bottom:14px;text-transform:uppercase}

  /* concept screen */
  .concept-icon{font-size:42px;margin-bottom:12px}
  .h-title{font-size:23px;font-weight:800;letter-spacing:-.02em;margin-bottom:14px;line-height:1.2}
  .concept-text{font-size:16px;color:var(--ink);margin-bottom:18px;line-height:1.6}
  .example{background:var(--indigo-soft);border-radius:14px;padding:14px 16px;margin-bottom:8px}
  .example .lbl{font-size:11px;font-weight:700;color:var(--indigo);letter-spacing:.05em;
    text-transform:uppercase;margin-bottom:5px}
  .example .txt{font-size:15px;color:var(--ink)}
  .example .txt b{color:var(--indigo)}

  /* question */
  .q-text{font-size:18px;font-weight:700;margin-bottom:6px;line-height:1.35}
  .q-sub{font-size:14px;color:var(--muted);margin-bottom:18px}

  /* options (multiple choice / VF) */
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{background:var(--surface);border:2px solid var(--line);border-radius:14px;
    padding:15px 16px;font-size:15px;font-weight:600;cursor:pointer;text-align:left;
    transition:.12s;color:var(--ink);display:flex;align-items:center;gap:12px}
  .opt:hover{border-color:var(--indigo-2)}
  .opt .key{width:26px;height:26px;border-radius:7px;background:var(--indigo-soft);
    color:var(--indigo);display:grid;place-items:center;font-weight:800;font-size:13px;flex:0 0 auto}
  .opt.sel{border-color:var(--indigo);background:var(--indigo-soft)}
  .opt.correct{border-color:var(--green);background:var(--green-soft)}
  .opt.correct .key{background:var(--green);color:#fff}
  .opt.wrong{border-color:var(--red);background:var(--red-soft)}
  .opt.wrong .key{background:var(--red);color:#fff}
  .opt.disabled{pointer-events:none;opacity:.55}
  .opts.vf{flex-direction:row}
  .opts.vf .opt{flex:1;justify-content:center;font-size:16px}

  /* order exercise */
  .order-hint{font-size:13px;color:var(--muted);margin-bottom:12px}
  .order-list{display:flex;flex-direction:column;gap:9px}
  .order-item{background:var(--surface);border:2px solid var(--line);border-radius:12px;
    padding:13px 14px;font-size:15px;font-weight:600;cursor:grab;display:flex;
    align-items:center;gap:10px;user-select:none;transition:border-color .12s}
  .order-item:active{cursor:grabbing}
  .order-item.dragging{opacity:.4;border-color:var(--indigo)}
  .order-item .grip{color:var(--muted);font-size:18px;flex:0 0 auto}
  .order-item .num{width:22px;height:22px;border-radius:6px;background:var(--indigo-soft);
    color:var(--indigo);display:grid;place-items:center;font-weight:800;font-size:12px;flex:0 0 auto}
  .order-item.correct{border-color:var(--green);background:var(--green-soft)}
  .order-item.wrong{border-color:var(--red);background:var(--red-soft)}

  /* feedback banner */
  .feedback{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    padding:18px 18px 22px;border-radius:22px 22px 0 0;transform:translateY(110%);
    transition:transform .3s cubic-bezier(.2,.8,.2,1);z-index:15}
  .feedback.show{transform:translateY(0)}
  .feedback.ok{background:var(--green-soft);border-top:2px solid var(--green-line)}
  .feedback.no{background:var(--red-soft);border-top:2px solid var(--red-line)}
  .fb-head{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;margin-bottom:4px}
  .feedback.ok .fb-head{color:#0c6b41}
  .feedback.no .fb-head{color:#a8261d}
  .fb-text{font-size:14px;margin-bottom:14px}
  .feedback.ok .fb-text{color:#0c6b41}
  .feedback.no .fb-text{color:#a8261d}
  .fb-btn{width:100%;border:none;border-radius:13px;padding:15px;font-size:16px;
    font-weight:800;cursor:pointer;color:#fff;font-family:var(--sans)}
  .feedback.ok .fb-btn{background:var(--green)}
  .feedback.no .fb-btn{background:var(--red)}

  /* footer (check button) */
  .footer{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--line);
    padding:14px 18px}
  .check{width:100%;border:none;border-radius:14px;padding:16px;font-size:16px;
    font-weight:800;cursor:pointer;font-family:var(--sans);transition:.15s}
  .check.ready{background:var(--indigo);color:#fff}
  .check.idle{background:var(--indigo-soft);color:#a59ce0;cursor:not-allowed}
  .skip{width:100%;background:none;border:none;color:var(--muted);font-weight:700;
    font-size:14px;padding:12px;margin-top:4px;cursor:pointer;display:none}
  .skip.show{display:block}

  /* complete */
  .done{text-align:center;padding:50px 24px;display:none}
  .done.show{display:block;animation:pop .4s ease}
  @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
  .done .tro{font-size:60px;margin-bottom:12px}
  .done h2{font-size:25px;font-weight:800;margin-bottom:8px;letter-spacing:-.02em}
  .done p{color:var(--muted);margin-bottom:26px}
  .done .stats{display:flex;gap:12px;justify-content:center;margin-bottom:30px}
  .done .st{background:var(--indigo-soft);border-radius:16px;padding:18px 24px}
  .done .st .n{font-size:28px;font-weight:800;color:var(--indigo)}
  .done .st .l{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px;letter-spacing:.03em}
  .done .next-unit{background:var(--green-soft);border:1px solid var(--green-line);
    border-radius:14px;padding:14px;color:#0c6b41;font-weight:700;font-size:14px}

  .toast{position:fixed;left:50%;top:64px;transform:translateX(-50%) translateY(-20px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-weight:700;
    font-size:13px;opacity:0;pointer-events:none;transition:.35s;z-index:30}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="close" id="closeBtn">✕</button>
    <div class="progress"><div class="progress-fill" id="prog"></div></div>
    <div class="lives" id="lives"><span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span></div>
  </div>

  <div class="body" id="screen"><!-- rendered by JS --></div>

  <div class="done" id="done">
    <div class="tro">🎉</div>
    <h2>Tópico concluído!</h2>
    <p id="doneMsg">Você entendeu a ideia. Bora pra próxima.</p>
    <div class="stats">
      <div class="st"><div class="n" id="dXp">0</div><div class="l">XP</div></div>
      <div class="st"><div class="n" id="dAcc">0%</div><div class="l">ACERTOS</div></div>
    </div>
    <div class="next-unit" id="nextUnit">▶ Próximo tópico desbloqueado</div>
  </div>

  <div class="footer" id="footer">
    <button class="check idle" id="checkBtn" disabled>Verificar</button>
    <button class="skip" id="skipBtn">Pular por enquanto →</button>
  </div>

  <div class="feedback" id="feedback">
    <div class="fb-head" id="fbHead"></div>
    <div class="fb-text" id="fbText"></div>
    <button class="fb-btn" id="fbBtn">Continuar</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CodePath BR — Unidade 1: Lógica de Programação (protótipo navegável)
   Tipos de tela: conceito+checagem, múltipla escolha, V/F, ordenar passos.
   SEM código / SEM Pyodide / SEM IA. Tudo determinístico.
   ============================================================ */

// ----- Tópico 1.1 completo como conteúdo navegável -----
const TOPIC = {
  crumb: "MÓDULO 1 · UNIDADE 1 · TÓPICO 1.1",
  title: "O que é um programa?",
  screens: [
    {
      type: "concept",
      icon: "📋",
      title: "O que é um programa?",
      text: "Um programa é como uma receita: uma lista de instruções que o computador segue, uma por uma, na ordem que você escreveu. Ele não adivinha nada — faz exatamente o que você manda.",
      exampleLabel: "No mundo real",
      exampleHtml: "Uma receita de bolo é um programa: <b>misture os ovos → adicione farinha → asse 40 min</b>. Trocar a ordem estraga o bolo.",
      // a checagem que vem logo após o conceito
      check: {
        q: "O que o computador faz com as instruções de um programa?",
        opts: ["Adivinha o que você quis dizer", "Segue exatamente, na ordem escrita", "Escolhe a ordem que achar melhor"],
        answer: 1,
        wrongHint: "O computador não adivinha — ele obedece ao pé da letra, na ordem dada."
      }
    },
    {
      type: "choice",
      q: "Qual destes é um \"programa\" no dia a dia?",
      opts: ["Uma foto", "Um manual de montagem de móvel", "Uma música"],
      answer: 1,
      okMsg: "Isso! Um manual é uma sequência de passos a seguir.",
      noMsg: "Pense no que tem passos a seguir em ordem — como um manual de montagem."
    },
    {
      type: "vf",
      q: "Verdadeiro ou falso?",
      sub: "\"Um computador faz o que você QUIS dizer, mesmo se você escrever errado.\"",
      answer: false,
      okMsg: "Exato. Ele faz o que você ESCREVEU, não o que você quis.",
      noMsg: "Falso! O computador segue o que está escrito, não a sua intenção."
    },
    {
      type: "order",
      q: "Coloque os passos na ordem para fazer um café",
      hint: "Arraste para reordenar — de cima (primeiro) para baixo (último).",
      // ordem correta:
      correct: ["Pegar a xícara", "Colocar o pó", "Ligar a máquina", "Apertar o botão"],
      okMsg: "Sequência perfeita! A ordem dos passos é tudo.",
      noMsg: "Quase! Pense na ordem real: pegar a xícara antes de apertar o botão."
    },
    {
      type: "choice",
      q: "Se um programa tem os passos na ordem errada, o que acontece?",
      opts: ["Ele faz a coisa errada, mesmo sem dar \"erro\"", "Ele se corrige sozinho", "Nada acontece"],
      answer: 0,
      okMsg: "Isso mesmo. Ordem errada = resultado errado, mesmo sem mensagem de erro.",
      noMsg: "O computador não se corrige. Ordem errada gera resultado errado, silenciosamente."
    }
  ]
};

const KEYS = ["A","B","C","D"];
const state = { i:0, lives:3, xp:0, correct:0, answered:0, attempts:0, sel:null, orderArr:null, locked:false };

const $ = id=>document.getElementById(id);
const screen=$("screen"), checkBtn=$("checkBtn"), skipBtn=$("skipBtn"),
      feedback=$("feedback"), toast=$("toast");

function render(){
  const s = TOPIC.screens[state.i];
  state.sel=null; state.locked=false; state.attempts=0;
  skipBtn.classList.remove("show");
  setCheck(false);
  updateProgress();

  let html = `<div class="crumb">${TOPIC.crumb}</div>`;

  if(s.type==="concept"){
    html += `
      <div class="concept-icon">${s.icon}</div>
      <div class="h-title">${s.title}</div>
      <div class="concept-text">${s.text}</div>
      <div class="example"><div class="lbl">${s.exampleLabel}</div><div class="txt">${s.exampleHtml}</div></div>`;
    // concept also shows its check question right below
    html += `<div style="height:22px"></div>
      <div class="q-text">${s.check.q}</div>
      <div class="opts" id="opts">` +
      s.check.opts.map((o,idx)=>optHtml(o,idx)).join("") + `</div>`;
    screen.innerHTML = html;
    wireOpts(()=>{}); // selecting enables check
    checkBtn.textContent = "Verificar";
  }
  else if(s.type==="choice"){
    html += `<div class="q-text">${s.q}</div>
      <div class="opts" id="opts">` + s.opts.map((o,idx)=>optHtml(o,idx)).join("") + `</div>`;
    screen.innerHTML = html; wireOpts(()=>{});
  }
  else if(s.type==="vf"){
    html += `<div class="q-text">${s.q}</div><div class="q-sub">${s.sub}</div>
      <div class="opts vf" id="opts">
        ${optHtml("Verdadeiro",1)}${optHtml("Falso",0)}
      </div>`;
    screen.innerHTML = html; wireOpts(()=>{});
  }
  else if(s.type==="order"){
    state.orderArr = shuffle([...s.correct]);
    html += `<div class="q-text">${s.q}</div><div class="order-hint">${s.hint}</div>
      <div class="order-list" id="orderList">` +
      state.orderArr.map((t,idx)=>orderItemHtml(t,idx)).join("") + `</div>`;
    screen.innerHTML = html;
    wireOrder();
    setCheck(true); // order always has an arrangement -> can check anytime
  }
}

function optHtml(label,idx){
  return `<button class="opt" data-idx="${idx}">
    <span class="key">${KEYS[idx]}</span><span>${label}</span></button>`;
}
function orderItemHtml(label,idx){
  return `<div class="order-item" draggable="true" data-label="${label}">
    <span class="grip">⠿</span><span class="num">${idx+1}</span><span>${label}</span></div>`;
}

function wireOpts(){
  screen.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(state.locked) return;
      screen.querySelectorAll(".opt").forEach(b=>b.classList.remove("sel"));
      btn.classList.add("sel");
      state.sel = parseInt(btn.dataset.idx);
      setCheck(true);
    });
  });
}

/* drag & drop ordering (touch + mouse via HTML5 DnD with fallback) */
function wireOrder(){
  const list = $("orderList");
  let dragEl=null;
  list.querySelectorAll(".order-item").forEach(item=>{
    item.addEventListener("dragstart",e=>{dragEl=item;item.classList.add("dragging")});
    item.addEventListener("dragend",()=>{item.classList.remove("dragging");renumber()});
    item.addEventListener("dragover",e=>{
      e.preventDefault();
      const after = getAfter(list,e.clientY);
      if(after==null) list.appendChild(dragEl);
      else list.insertBefore(dragEl,after);
    });
  });
  // touch fallback: tap to move down (simple, mobile-friendly)
  list.querySelectorAll(".order-item").forEach(item=>{
    let touchY=0;
    item.addEventListener("touchstart",e=>{touchY=e.touches[0].clientY;item.classList.add("dragging")},{passive:true});
    item.addEventListener("touchmove",e=>{
      e.preventDefault();
      const y=e.touches[0].clientY;
      const after=getAfter(list,y);
      if(after==null) list.appendChild(item);
      else if(after!==item) list.insertBefore(item,after);
    },{passive:false});
    item.addEventListener("touchend",()=>{item.classList.remove("dragging");renumber()});
  });
}
function getAfter(list,y){
  const els=[...list.querySelectorAll(".order-item:not(.dragging)")];
  return els.reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0 && offset>closest.offset) return {offset,element:child};
    return closest;
  },{offset:-Infinity}).element || null;
}
function renumber(){
  $("orderList").querySelectorAll(".order-item").forEach((it,idx)=>{
    it.querySelector(".num").textContent=idx+1;
  });
}

function setCheck(ready){
  checkBtn.classList.toggle("ready",ready);
  checkBtn.classList.toggle("idle",!ready);
  checkBtn.disabled=!ready;
}

function check(){
  const s = TOPIC.screens[state.i];
  state.locked=true;
  let isCorrect=false, explain="";

  if(s.type==="concept"){
    isCorrect = state.sel===s.check.answer;
    explain = isCorrect ? "Você entendeu a ideia central." : s.check.wrongHint;
    paintOpts(s.check.answer);
  }else if(s.type==="choice"||s.type==="vf"){
    isCorrect = state.sel===s.answer;
    explain = isCorrect ? s.okMsg : s.noMsg;
    paintOpts(s.answer);
  }else if(s.type==="order"){
    const cur=[...$("orderList").querySelectorAll(".order-item")].map(i=>i.dataset.label);
    isCorrect = JSON.stringify(cur)===JSON.stringify(s.correct);
    explain = isCorrect ? s.okMsg : s.noMsg;
    paintOrder(cur,s.correct);
  }

  state.answered++;
  if(isCorrect){
    state.correct++; state.xp+=10;
    showFeedback(true,"Mandou bem!",explain);
  }else{
    state.attempts++;
    loseLife();
    if(state.attempts>=3){
      // allow skip after 3 tries -> mark topic for review
      showFeedback(false,"Vamos revisar depois",explain+" Este tópico vai voltar na revisão.");
      skipBtn.classList.add("show");
    }else{
      showFeedback(false,"Quase lá",explain+` (tentativa ${state.attempts}/3)`);
    }
  }
}

function paintOpts(answerIdx){
  screen.querySelectorAll(".opt").forEach(b=>{
    b.classList.add("disabled");
    const idx=parseInt(b.dataset.idx);
    if(idx===answerIdx) b.classList.add("correct");
    else if(idx===state.sel) b.classList.add("wrong");
  });
}
function paintOrder(cur,correct){
  $("orderList").querySelectorAll(".order-item").forEach((it,idx)=>{
    it.setAttribute("draggable","false");
    it.classList.add(cur[idx]===correct[idx]?"correct":"wrong");
  });
}

function showFeedback(ok,head,text){
  feedback.className="feedback "+(ok?"ok":"no")+" show";
  $("fbHead").innerHTML=(ok?"✓ ":"✕ ")+head;
  $("fbText").textContent=text;
  $("fbBtn").textContent = ok ? "Continuar" : (state.attempts>=3 ? "Entendi" : "Tentar de novo");
  $("fbBtn").onclick = ()=>{
    feedback.classList.remove("show");
    if(ok || state.attempts>=3){ advance(); }
    else { // retry same screen
      state.locked=false;
      screen.querySelectorAll(".opt").forEach(b=>b.classList.remove("disabled","correct","wrong","sel"));
      if(TOPIC.screens[state.i].type==="order"){
        $("orderList").querySelectorAll(".order-item").forEach(it=>{
          it.setAttribute("draggable","true");it.classList.remove("correct","wrong");
        });
      }else{ state.sel=null; setCheck(false); }
    }
  };
}

function advance(){
  state.i++;
  if(state.i>=TOPIC.screens.length){ finish(); return; }
  render();
}

function finish(){
  $("screen").style.display="none";
  $("footer").style.display="none";
  const acc = Math.round((state.correct/state.answered)*100);
  $("dXp").textContent=state.xp;
  $("dAcc").textContent=acc+"%";
  $("doneMsg").textContent = acc>=70
    ? "Você entendeu a lógica. Próximo tópico liberado!"
    : "Você concluiu — alguns pontos voltam na revisão da unidade.";
  updateProgress(true);
  $("done").classList.add("show");
  showToast("🎉 +"+state.xp+" XP");
}

function loseLife(){
  if(state.lives<=0) return;
  state.lives--;
  const h=$("lives").querySelectorAll(".heart");
  h.forEach((el,i)=>el.classList.toggle("lost",i>=state.lives));
  if(state.lives===0){
    showToast("💔 No protótipo você continua mesmo sem vidas");
    setTimeout(()=>{state.lives=3;h.forEach(el=>el.classList.remove("lost"))},1400);
  }
}

function updateProgress(done){
  const pct = done?100:(state.i/TOPIC.screens.length)*100;
  $("prog").style.width=pct+"%";
}

let tt;
function showToast(m){toast.textContent=m;toast.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove("show"),2200)}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// skip / close
skipBtn.addEventListener("click",()=>{feedback.classList.remove("show");showToast("↪ Tópico marcado para revisão");advance()});
$("closeBtn").addEventListener("click",()=>showToast("(no app real, isto volta pra trilha)"));
checkBtn.addEventListener("click",()=>{if(!checkBtn.disabled)check()});

render();
</script>
</body>
</html>
